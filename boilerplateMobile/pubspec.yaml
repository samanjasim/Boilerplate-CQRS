name: boilerplate_mobile
description: "Boilerplate CQRS — Flutter mobile client. Modular Clean Architecture with flavors and a module system mirroring the BE/FE."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # DI
  get_it: ^8.0.0
  injectable: ^2.7.1

  # Routing
  auto_route: ^11.1.0

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10

  # Codegen annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Utilities
  equatable: ^2.0.5
  intl: ^0.20.2
  logger: ^2.4.0
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  freezed: ^3.2.5
  json_serializable: ^6.8.0
  injectable_generator: ^2.12.1
  auto_route_generator: ^10.5.0
  very_good_analysis: ^6.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
